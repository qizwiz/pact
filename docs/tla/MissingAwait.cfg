\* MissingAwait checker — TLC model configuration
\* Three representative sites:
\*   s_consumed  — wrapped in create_task (in _CORO_CONSUMERS) → must NOT be flagged
\*   s_real_bug  — awaitable, unknown wrapper → MUST be flagged
\*   s_not_async — not a coroutine at all → must NOT be flagged
\*
\* Run: java -XX:+UseParallelGC -jar ~/.local/share/tla2tools.jar \
\*        -config MissingAwait.cfg -deadlock MissingAwait

SPECIFICATION Spec

CONSTANTS
    Sites         = {"s_consumed", "s_real_bug", "s_not_async"}
    ConsumedSites  = {"s_consumed"}
    AwaitableSites = {"s_consumed", "s_real_bug"}

INVARIANTS
    TypeInvariant
    NoFalsePositive

PROPERTIES
    ConsumedSitesPermanentlyClean
    MonotonicViolations
    EventuallyFlagged
    CompletionCorrectness
