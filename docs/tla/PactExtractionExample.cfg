\* TLC configuration for PactExtractionExample.tla
\* Instantiates Pact's extraction model with a concrete 3-function codebase.
\* Run: java -XX:+UseParallelGC -jar tla2tools.jar -config PactExtractionExample.cfg -deadlock PactExtractionExample
SPECIFICATION ExtractionSpec

CONSTANTS
    \* Concrete sets assigned directly
    Modes      = {"required_arg_missing"}
    FileModes  = {}
    Sites      = {"s1", "s2", "s3"}
    Files      = {}
    Functions  = {"process", "validate", "route"}
    \* Complex values (records, functions) substituted via module operators
    Contracts  <- ContractImpl
    CallSites3 <- CallSites3Impl
    Provision  <- ProvisionImpl

INVARIANTS
    ExtractionTypeInvariant
    ExtractionSafety

PROPERTIES
    ExtractionConfluent
