name: pact — PR call graph

on:
  pull_request:
    paths:
      - "**.py"

permissions:
  pull-requests: write

jobs:
  graph:
    name: call graph + violations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pact + deps
        run: pip install z3-solver networkx .

      - name: Run pact (diff-scoped)
        id: pact
        run: |
          # --diff restricts violations to changed files; --pr-comment emits
          # the full Mermaid call graph + reduction sequence as a PR comment body.
          comment=$(pact . --diff main --pr-comment --suggest 2>/dev/null || true)
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$comment" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Post graph comment
        uses: actions/github-script@v7
        with:
          script: |
            const body = `${{ steps.pact.outputs.body }}`;
            if (!body || body.includes("no violations found") && !body.includes("```mermaid")) {
              console.log("pact: clean diff, skipping comment");
              return;
            }

            // Delete previous pact graph comments on this PR to avoid clutter
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            for (const c of comments.data) {
              if (c.user.login === "github-actions[bot]" && c.body.includes("## pact analysis")) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: c.id,
                });
              }
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body,
            });
