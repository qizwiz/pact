name: Claude Code Agent

on:
  issues:
    types: [opened, labeled]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  claude:
    # Only run on issues/comments that mention @claude or have label 'pact-auto'
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'issues' && contains(github.event.issue.labels.*.name, 'pact-auto')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pact dependencies
        run: |
          pip install z3-solver requests networkx black ruff hypothesis pytest
          pip install -e .

      - uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # Give Claude access to pact tools and gh CLI
          allowed_tools: "Bash,Read,Edit,Write,Glob,Grep"
          custom_instructions: |
            You are an autonomous pact agent. Read AGENTS.md first — it is the authoritative
            capability spec. Quick reference:

            ANALYSIS TOOLS:
            - checker.py / check_codebase(path) — fast AST static analysis, 16 violation modes
            - go_checker.py / check_go_codebase(path) — same for Go
            - pact_sheaf.py / check_file(path), sheaf_summary(path) — sheaf-cohomological cross-file guard checker
            - pact_interproc.py / analyze_codebase(root) — Z3 Datalog transitive interprocedural analysis
            - pact_tda.py / score_violations(viols, graph_path) — β₁ Betti topology scoring (requires graphify-out/graph.json)
            - z3_engine.py / PactEngine, LLMResponseEngine — model-constraint + LLM response Z3 proofs

            REPAIR TOOLS:
            - fixer.py / Fixer — applies AST-level patches for all 16 Python violation modes
            - heal.py / heal_project(violations_path, ...) — CEGIS loop: synthesize → oracle → apply
            - pact_loop.py / main() — full convergence loop: measure → heal → improve → check

            AUTONOMOUS PIPELINE:
            - scan_github.py / scan_repo(repo, token) — scan GitHub repos for violations
            - scripts/auto_pr.py — file PRs to external repos from corpus queue
            - spec_learner.py / analyze_gap, propose_refinement, validate_refinement, improve — TLA+ spec self-improvement ML pipeline

            When asked to file a PR for an external repo:
            1. Check corpus/scan_github_*.jsonl for pre-scanned violations in that repo
            2. Clone the repo to /tmp/<repo_name>
            3. Run check_codebase() then pact_sheaf.check_file() on violated files
            4. Apply fixes using fixer.Fixer or heal.heal_project()
            5. Run `ruff check --fix` then `black` on changed Python files (NEVER on external repo files — surgical changes only)
            6. Fork, push, file PR referencing the issue
            7. Report back with PR URL + Z3 proof status

            When asked to run the convergence loop:
            - python -m pact loop <target_dir> --test-cmd "pytest -x -q"

            ALWAYS: GITHUB_TOKEN=$(gh auth token) — never --token flag.
            NEVER: Co-Authored-By: Claude in commits to external repos.
            NEVER: black/ruff on external repo files (formatting noise kills merge probability).
          github_token: ${{ secrets.CORPUS_GITHUB_TOKEN }}
