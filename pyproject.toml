[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.backends.legacy:build"

[project]
name = "pact-tool"
version = "0.1.0"
description = "Python AST Constraint Tool — formal verification (Z3 + TLA+) for every Python codebase"
readme = "README.md"
requires-python = ">=3.10"
license = {text = "MIT"}
dependencies = [
    "z3-solver>=4.12",
]

[project.optional-dependencies]
llm = ["anthropic>=0.20"]
dev = ["pytest", "hypothesis", "z3-solver", "anthropic"]

[project.scripts]
pact = "pact.cli:main"

[tool.setuptools]
packages = ["pact"]
package-dir = {"pact" = "."}

[tool.pytest.ini_options]
# inherited from pytest.ini
